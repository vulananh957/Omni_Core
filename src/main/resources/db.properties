# ============================================================
# WMS Hub — Database Configuration
# ============================================================
# Priority: Environment Variables &gt; This file &gt; Hardcoded defaults
# Recommended: Set DB_PASSWORD and LAZADA credentials via environment variables
# ============================================================

# Connection
db.host=localhost
db.port=3306
db.name=wms_hub
db.username=root
db.password=

# HikariCP Pool Settings
db.pool.minIdle=2
db.pool.maxSize=10
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# Lazada API Credentials
# SECURITY: Set via environment variables LAZADA_APP_KEY and LAZADA_APP_SECRET
# instead of hardcoding here. Defaults are for local development only.
lazada.appKey=138771
lazada.appSecret=
