# ============================================================
# WMS Hub — Database Configuration
# ============================================================
# Priority: Environment Variables &gt; This file &gt; Hardcoded defaults
# Recommended: Set DB_PASSWORD and LAZADA credentials via environment variables
# ============================================================

# Connection
db.host=localhost
db.port=3306
db.name=wms_hub
db.username=root
db.password=

# HikariCP Pool Settings
db.pool.minIdle=5
db.pool.maxSize=30
db.pool.initialSize=5
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# Flyway Migration
db.migration.path=db/migration

# Lazada Auto-Sync Scheduler
# Runs on every channel with platform='Lazada' and a valid access_token.
# Set to false to disable background sync.
lazada.sync.enabled=true
lazada.sync.interval.minutes=5
